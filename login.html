<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Paint - Iniciar Sesión</title>
    <style>
        :root {
            --bg-color: #0f0c20;
            --card-bg: #1a1636;
            --text-color: #ffffff;
            --input-bg: #252048;
            --border-color: #3b3575;
            --btn-grad: linear-gradient(135deg, #00ea92 0%, #00c4cc 100%);
        }
        body { 
            font-family: 'Poppins', 'Segoe UI', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            box-sizing: border-box;
        }
        .container { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 420px; 
            border: 1px solid var(--border-color);
        }
        h2 { text-align: center; margin-top: 0; font-weight: 600; letter-spacing: 1px; background: linear-gradient(to right, #00ea92, #00c4cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { text-align: center; color: #8b85b1; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: #a29bfe; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: #fff; font-size: 15px; transition: all 0.3s ease; box-sizing: border-box; }
        input:focus { outline: none; border-color: #00ea92; box-shadow: 0 0 8px rgba(0, 234, 146, 0.4); }
        .btn { width: 100%; padding: 14px; background: var(--btn-grad); border: none; color: #0f0c20; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: transform 0.2s, opacity 0.2s; box-shadow: 0 4px 15px rgba(0, 234, 146, 0.3); }
        .btn:hover { transform: translateY(-2px); opacity: 0.95; }
        .msg { padding: 12px; margin-bottom: 20px; border-radius: 8px; display: none; text-align: center; font-size: 14px; font-weight: 500; }
        .error { background-color: rgba(234, 84, 85, 0.2); color: #ea5455; border: 1px solid #ea5455; }
        .success { background-color: rgba(40, 199, 111, 0.2); color: #28c76f; border: 1px solid #28c76f; }
        .link { text-align: center; margin-top: 25px; display: block; color: #ff416c; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; }
        .link:hover { color: #ffffff; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>BODY PAINT</h2>
    <p class="subtitle">Acceder al Panel de Clientes</p>
    <div id="mensaje" class="msg"></div>
    
    <form id="formLogin">
        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" class="btn">Iniciar Sesión</button>
    </form>
    <a href="registro.html" class="link">¿No tienes una cuenta? Regístrate aquí</a>
</div>

<script src="app.js"></script>
</body>
</html>
